<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8"/>
	<meta property='og:type' content='website'/>
	<meta property='og:site_name' content='Lotus'/>
	<meta property='og:description' content="Inbe - Guided Wim Hof Breathing"/>
	<meta property='og:logo' content="media/pyur.svg"/>
	<meta property="og:title" content="Inbe - Guided Breathing"/>
	<meta name="viewport" content="width=device-width" />
	<link href="media/pyur.svg" type="image/svg" rel="shortcut icon">
	<title>Inner Breeze - Guided Breathing</title>
	<link rel="stylesheet" href="../style.css">
	<style>
		textarea,
		select,
		input,
		button {
			outline: none;
		}

		body {
			width: 100%;
			margin: auto;
			display: flex;
			flex-direction: column;
			align-items: center;
		}

		#display {
			image-rendering: pixelated;
			image-rendering: crisp-edges;
			touch-action: none;
			display: block;
			margin: 0 auto;
			cursor: none;
		}

		#metadata {
			display: flex;
			flex-direction: row;
			flex-wrap: wrap;
			justify-content: space-around;
			align-content: start;
		}

		#metadata ul {
			margin-left: 25px;
			padding: 0;
			float: left;
			line-height: 24px;
			margin-bottom: 45px;
		}

		#metadata ul li {
			color: #5a5a5a;
			list-style-type: none;
		}

		#metadata b {
			color: #2b2b2b;
		}

		#metadata button {
			display: inline-block;
			background: #2b2b2b;
			border: 0;
			font-size: 12px;
			border-radius: 30px;
			padding: 2px 10px;
			line-height: 20px;
			margin-bottom: 1px;
			vertical-align: center;
			color: #e8e4d8;
		}

		#metadata button:hover {
			background: #3a5c8b;
			cursor: pointer;
		}

		#metadata kbd {
			border: 0;
			font-size: 11px;
			font-weight: bold;
			padding: 2px 2px;
			border-radius: 30px;
			color: #2b2b2b;
		}

		#console_err {
			color: #8b3a3a;
			font-weight: bold;
		}

		#console {
			position: relative;
		}

		#console > * {
			border: 0;
			font-family: mono;
			font-size: 12px;
			line-height: 20px;
			background: #d4d0c4;
			color: #2b2b2b;
			margin: 0;
			padding: 0;
			width: 100%;
		}

		div.noscript {
			display: block;
			padding: 15px;
			margin: 30px auto;
			max-width: 400px;
		}

		div.noscript img {
			float: left;
			margin-right: 15px;
		}

		div.noscript a {
			text-decoration: underline;
			font-weight: bold;
		}
	</style>
</head>
<body>
	<div id="emulator">
		<canvas id="display" width="100" height="100"></canvas>
		<div id='console'>
			<pre id='console_std'></pre>
			<pre id='console_err'></pre>
		</div>
		<div id='metadata'>
			<ul><li><img src='media/pyur.svg' width='60'/></li></ul>
			<ul>
				<li><b>Inbe</b></li>
				<li>Guided Wim Hof Breathing</li>
				<li><a href='../index.html'>Back to Projects</a></li>
			</ul>
			<ul>
				<li><button onclick="emulator.screen.toggle_zoom()">Zoom</button></li>
				<li><kbd>A</kbd> ctrl <kbd>B</kbd> alt <kbd>SEL</kbd> shift</li>
				<li><span id='metarom'>Loading inbe.rom...</span></li>
			</ul>
		</div>
	</div>
	<noscript>
		<div class='noscript'>
			<img src='media/pyur.svg' width='40'/>
			<p>Inbe requires javascript to run.</p>
		</div>
	</noscript>
	<script src="src/uxn.js"></script>
	<script src="src/uxn-wasm.js"></script>
	<script src="src/emu.js"></script>
	<script src="src/devices/system.js"></script>
	<script src="src/devices/console.js"></script>
	<script src="src/devices/controller.js"></script>
	<script src="src/devices/datetime.js"></script>
	<script src="src/devices/mouse.js"></script>
	<script src="src/devices/screen.js"></script>
	<script src="src/boot.js"></script>
	<script>
		const emulator = new Emu(false)
		emulator.init()

		fetch('inbe.rom')
			.then(response => {
				if (!response.ok) {
					throw new Error(`HTTP ${response.status}: ${response.statusText}`);
				}
				return response.arrayBuffer();
			})
			.then(arrayBuffer => {
				const rom = new Uint8Array(arrayBuffer);
				emulator.load(rom);
				document.getElementById('metarom').textContent = `Running inbe.rom (${rom.length} bytes)`;
			})
			.catch(error => {
				console.error('Failed to load inbe.rom:', error);
				document.getElementById('console_err').textContent = `Failed to load inbe.rom: ${error.message}`;
				document.getElementById('metarom').textContent = 'Failed to load ROM';
			});
	</script>
</body>
</html>
